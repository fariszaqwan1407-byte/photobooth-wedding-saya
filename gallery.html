<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wedding Gallery</title>

<style>

body{
background:#111;
font-family:Arial;
margin:0;
padding:20px;
color:white;
}

h1{
text-align:center;
margin-bottom:25px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:15px;
box-shadow:0 0 15px rgba(255,215,0,.3);
}

</style>
</head>

<body>

<h1>📸 Wedding Memories</h1>

<div class="gallery" id="gallery"></div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxnEJ-G3uI8L3I0OJqmhgGpo7LYr8HhNUcgjtZUJ5Ai0UxvzhEdm6tYH16BT85kGbJ69g/exec?action=gallery";

async function loadGallery(){

const res = await fetch(API);
const data = await res.json();

let html="";

data.forEach(img=>{

html += `
<img src="${img.url}">
`;

});

document.getElementById("gallery").innerHTML=html;

}

loadGallery();

setInterval(loadGallery,5000);

</script>

</body>
</html>
